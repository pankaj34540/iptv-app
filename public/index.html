<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamVault - Private IPTV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-page" class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="login-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
          </div>
          <h1>StreamVault</h1>
          <p>Private IPTV Streaming</p>
        </div>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="form-input" placeholder="Enter username">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Enter password">
          </div>
          <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
      </div>
    </div>
  </div>

  <div id="app-container" class="app-container">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
          </div>
          <span>StreamVault</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Library</div>
          <div class="nav-item active" data-section="all">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            All Channels
          </div>
          <div class="nav-item" data-section="favorites">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            Favorites <span class="nav-badge" id="favorites-count">0</span>
          </div>
          <div class="nav-item" data-section="recent">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Recent
          </div>
          <div class="nav-item" data-section="custom">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            Custom
          </div>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Playlists</div>
          <div id="playlists-nav" class="playlist-list"></div>
          <div class="nav-item" id="add-playlist-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Playlist
          </div>
        </div>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-secondary btn-sm" id="logout-btn" style="width: 100%">Sign Out</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <button class="btn-icon" id="mobile-menu-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="search-container">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search channels...">
        </div>
        <div class="top-bar-actions">
          <select id="category-filter" class="category-filter"><option value="">All Categories</option></select>
          <button class="btn-icon" id="add-custom-btn" title="Add Custom Channel"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></button>
        </div>
      </header>

      <div class="content-area">
        <section id="player-section" class="player-section hidden">
          <div class="player-container">
            <video id="video-player" controls playsinline></video>
            <div class="player-info">
              <div class="player-channel-name" id="player-channel-name"></div>
              <div class="player-channel-category" id="player-channel-category"></div>
            </div>
            <div class="player-controls">
              <button class="player-fullscreen-btn" id="fullscreen-btn">⛶</button>
            </div>
          </div>
        </section>
        <div id="loading-state" class="loading-overlay hidden">
          <div class="spinner"></div>
          <div class="loading-text">Loading channels...</div>
        </div>
        <section id="channels-section" class="section">
          <div class="section-header">
            <h2 class="section-title"><span id="section-title-text">All Channels</span></h2>
            <span id="channel-count">0 channels</span>
          </div>
          <div id="channel-grid" class="channel-grid"></div>
          <div id="empty-state" class="empty-state hidden">
            <h3>No channels found</h3>
            <p>Add a playlist to get started</p>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div id="playlist-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Add Playlist</h2>
        <button class="modal-close" data-close-modal>×</button>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="m3u">M3U Playlist</button>
        <button class="modal-tab" data-tab="xtream">Xtream Codes</button>
      </div>
      <div class="modal-body">
        <div id="m3u-tab">
          <div class="form-group">
            <label>Playlist Name</label>
            <input type="text" id="playlist-name" class="form-input" placeholder="My Playlist">
          </div>
          <div class="form-group">
            <label>M3U URL</label>
            <textarea id="m3u-url" class="form-textarea" placeholder="Paste M3U URL..."></textarea>
          </div>
        </div>
        <div id="xtream-tab" class="hidden">
          <div class="form-group">
            <label>Account Name</label>
            <input type="text" id="xtream-name" class="form-input" placeholder="My Account">
          </div>
          <div class="form-group">
            <label>Server URL</label>
            <input type="text" id="xtream-server" class="form-input" placeholder="http://server:port">
          </div>
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="xtream-user" class="form-input">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="xtream-pass" class="form-input">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close-modal>Cancel</button>
        <button class="btn btn-primary" id="save-playlist-btn">Add Playlist</button>
      </div>
    </div>
  </div>

  <div id="custom-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Add Custom Channel</h2>
        <button class="modal-close" data-close-modal>×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Channel Name</label>
          <input type="text" id="custom-name" class="form-input">
        </div>
        <div class="form-group">
          <label>Stream URL</label>
          <input type="text" id="custom-url" class="form-input">
        </div>
        <div class="form-group">
          <label>Logo URL</label>
          <input type="text" id="custom-logo" class="form-input">
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="custom-category" class="form-input">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close-modal>Cancel</button>
        <button class="btn btn-primary" id="save-custom-btn">Add Channel</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="app.js"></script>
</body>
</html>
